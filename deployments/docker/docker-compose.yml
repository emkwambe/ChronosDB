version: '3.8'

services:
  chronosdb:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: chronosdb
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - chronosdb-data:/root/data
    environment:
      - REST_PORT=8080
      - GRPC_PORT=50051
      - API_KEY=${API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/db/test/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  chronosdb-with-kafka:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: chronosdb-kafka
    ports:
      - "8081:8080"
      - "50052:50051"
    volumes:
      - chronosdb-data-kafka:/root/data
    environment:
      - REST_PORT=8080
      - GRPC_PORT=50051
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=chronosdb-stream
      - KAFKA_GROUP=chronosdb-group
    depends_on:
      - kafka
    restart: unless-stopped

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    depends_on:
      - zookeeper
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    restart: unless-stopped

volumes:
  chronosdb-data:
  chronosdb-data-kafka:
