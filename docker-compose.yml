version: '3.8'

services:
  chronosdb:
    build: .
    container_name: chronosdb
    ports:
      - "8080:8080"
      - "8081:8081"
      - "50051:50051"
    volumes:
      - chronosdb-data:/data
    environment:
      - REST_PORT=8080
      - GRPC_PORT=50051
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/db/test/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  chronosdb-data:
